version: '3.8'

services:
  cube-stats:
    build: .
    container_name: cube-stats-v2
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      # Mount a local data folder so the SQLite database persists across container restarts
      - ./data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=8080
      - JWT_SECRET=${JWT_SECRET:-super-secret-default-key-change-me}
      - SCRYFALL_CACHE_DAYS=30
